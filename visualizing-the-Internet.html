<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>インターネットの裏側図解</title>
  
  <!-- Tailwind CSS の読み込み -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React と ReactDOM の読み込み -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- lucide-react UMDの読み込みエラー回避用 -->
  <script>window.react = window.React;</script>
  
  <!-- Babel の読み込み (ブラウザ内でJSXを変換) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Lucide React (アイコン) の読み込み -->
  <script src="https://unpkg.com/lucide-react@0.292.0/dist/umd/lucide-react.js"></script>

  <style>
    /* カスタムアニメーション用のスタイル定義 */
    @keyframes slideRight {
      0% { left: 5%; opacity: 0; transform: scale(0.8); }
      20% { opacity: 1; transform: scale(1); }
      80% { opacity: 1; transform: scale(1); }
      100% { left: 85%; opacity: 0; transform: scale(0.8); }
    }
    @keyframes wave {
      0% { transform: scale(1); opacity: 0.8; }
      100% { transform: scale(2.5); opacity: 0; }
    }
    @keyframes packetDrop {
      0% { left: 10%; opacity: 1; }
      40% { left: 40%; opacity: 1; top: 0; }
      50% { left: 45%; opacity: 0; top: 20px; transform: rotate(45deg); }
      100% { left: 45%; opacity: 0; }
    }
    @keyframes jitter {
      0% { left: 10%; }
      25% { left: 30%; }
      50% { left: 30%; } /* ここで引っかかる */
      75% { left: 60%; }
      100% { left: 90%; }
    }
    .animate-slide { animation: slideRight 3s infinite linear; }
    .animate-slide-fast { animation: slideRight 1.5s infinite linear; }
    .animate-wave { animation: wave 2s infinite ease-out; }
    .animate-drop { animation: packetDrop 3s infinite linear; }
    .animate-jitter { animation: jitter 3s infinite linear; }
  </style>
</head>
<body>
  <!-- Reactの描画先 -->
  <div id="root"></div>

  <!-- Reactのコード本体 -->
  <script type="text/babel">
    const { useState, useEffect } = React;
    // CDNから読み込んだLucideアイコンを取得 (UMDモジュール名は LucideReact)

    // メインアプリケーションコンポーネント
    function App() {
      return (
        <div className="min-h-screen bg-slate-50 text-slate-800 font-sans selection:bg-blue-200">
          {/* Header */}
          <header className="bg-gradient-to-r from-blue-600 to-indigo-700 text-white py-16 px-4 text-center shadow-lg relative overflow-hidden">
            <div className="absolute top-0 left-0 w-full h-full opacity-10 pointer-events-none">
              {/* 背景の装飾 */}
              <div className="absolute top-10 left-10"><Wifi size={100} /></div>
              <div className="absolute bottom-10 right-10"><Globe size={150} /></div>
            </div>
            <div className="max-w-4xl mx-auto relative z-10">
              <h1 className="text-4xl md:text-5xl font-extrabold mb-6 tracking-tight">
                スマホとゲームから読み解く<br/>インターネットの裏側
              </h1>
              <p className="text-xl md:text-2xl font-light text-blue-100 max-w-3xl mx-auto">
                毎日使っている「魔法の箱」の中身は、いったいどうなっている？<br />見えないネットワークの世界を覗いてみよう！
              </p>
            </div>
          </header>

          <main className="max-w-5xl mx-auto px-4 py-12 space-y-24">
            
            {/* Section 1: Client & Server */}
            <section>
              <SectionTitle icon={<Server className="text-blue-500" />} title="1. 魔法じゃない！「クライアント」と「サーバー」" />
              <div className="bg-white rounded-2xl shadow-xl p-8 border border-slate-100">
                <p className="text-lg mb-8 text-slate-600">
                  あなたのスマホやゲーム機は「独立した万能の機械」ではありません。遠くにある巨大なコンピューター（サーバー）にお願いをして、結果をもらっているだけの「窓口」なのです。レストランに例えてみましょう。
                </p>
                
                <div className="flex flex-col md:flex-row items-center justify-between bg-blue-50 p-6 rounded-xl relative">
                  <div className="flex flex-col items-center z-10">
                    <div className="bg-white p-4 rounded-full shadow-md mb-2"><Smartphone size={40} className="text-blue-600" /></div>
                    <span className="font-bold text-lg">お客様 (クライアント)</span>

                      <span className="absolute bottom-[-25px] text-xs font-bold text-green-600">レスポンス (料理)</span>

                    <div className="hidden md:flex flex-col items-center text-slate-400">

                      <span className="text-xs">ネットワーク (ウェイター)</span>

                  <div className="flex flex-col items-center z-10">
                    <div className="bg-white p-4 rounded-full shadow-md mb-2"><Database size={40} className="text-indigo-600" /></div>

                  <div className="flex items-center justify-between mb-4">

                  </ul>
                  <div className="mt-4 p-3 bg-slate-100 rounded-lg text-sm text-slate-600">
                    <strong>おすすめ:</strong> Web検索、LINE、遠い部屋での利用

                </div>

                {/* 5GHz Card */}
                <div className="bg-white rounded-2xl shadow-lg p-6 border-t-4 border-purple-500">
                  <div className="flex items-center justify-between mb-4">
                    <h3 className="text-2xl font-bold text-slate-800">5 GHz 帯</h3>
                    <span className="bg-purple-100 text-purple-800 text-xs font-bold px-3 py-1 rounded-full">高音メロディタイプ</span>

                  <div className="relative h-24 flex items-center mb-4 bg-slate-50 rounded-lg overflow-hidden">

                  <ul className="space-y-3">
                    <li className="flex items-start"><Zap className="text-purple-500 mr-2 shrink-0" /> 直進性が強く、非常に高速な通信が可能</li>
                    <li className="flex items-start"><ShieldCheck className="text-green-500 mr-2 shrink-0" /> 電波干渉が少なく、通信が安定する</li>
                    <li className="flex items-start"><AlertTriangle className="text-red-500 mr-2 shrink-0" /> 障害物に極めて弱く、ルーターとの間に遮蔽物があると切れる</li>

                  <div className="mt-4 p-3 bg-slate-100 rounded-lg text-sm text-slate-600">

                </div>
              </div>
              
              <div className="mt-6 bg-amber-50 border border-amber-200 rounded-xl p-4 flex items-center">
                <Router className="text-amber-600 mr-4 shrink-0" size={32}/>
                <p className="text-sm text-amber-800">
                  <strong>プロの技：</strong> ルーターも小さなパソコンです。通信が詰まってきたら「ルーターの電源を抜いて再起動」するだけで、メモリがクリアされて劇的に速くなることがあります！

                <div className="space-y-8">
                  {/* IPv4 */}
                  <div className="relative">
                    <h4 className="font-bold text-lg mb-2 flex items-center"><span className="bg-red-100 text-red-600 px-2 py-1 rounded mr-2 text-sm">旧規格</span> IPv4 (PPPoE方式)</h4>
                    <div className="h-20 bg-slate-200 rounded-lg relative overflow-hidden flex items-center px-4">
                      <div className="w-full flex justify-between items-center z-10">
                        <span className="font-bold text-slate-500">あなた</span>
                        <div className="flex flex-col items-center">

                      <div className="w-full flex justify-between items-center z-10">

                        <span className="bg-blue-500 text-white text-xs px-3 py-1 rounded-full shadow">直接接続 (顔パス)</span>

              </p>

              <div className="grid md:grid-cols-3 gap-4 mb-8">
                <div className="bg-slate-800 text-white rounded-xl p-5 shadow-lg">
                  <Clock className="text-blue-400 mb-3" size={32} />
                  <h4 className="font-bold text-lg mb-2">1. Ping値 (レイテンシ)</h4>
                  <p className="text-sm text-slate-300">データが往復する時間。物理的な距離が遠いサーバー（海外など）に繋ぐと、光の速さでも限界があるため必ず数値が上がります。</p>
                </div>
                <div className="bg-slate-800 text-white rounded-xl p-5 shadow-lg relative overflow-hidden">

                  <h4 className="font-bold text-lg mb-2">3. パケットロス</h4>
                  <p className="text-sm text-slate-300 z-10 relative">回線の混雑等でデータの一部が途中で消滅する現象。撃ったはずの弾がなかったことにされます。</p>
                  {/* Packet Loss animation */}
                  <div className="absolute bottom-4 left-0 w-full h-1 bg-slate-700">
                     <div className="w-4 h-4 bg-red-400 rounded-sm absolute -top-1.5 animate-drop"></div>
                  </div>
                </div>
              </div>

                      </tr>
                      <tr>
                        <td className="px-4 py-3 font-medium flex items-center"><Smartphone className="text-slate-500 mr-2" size={16}/> デバイス再起動</td>
                        <td className="px-4 py-3 text-slate-500">機器層</td>
                        <td className="px-4 py-3">メモリのキャッシュをクリアし、処理能力を正常化。</td>
                      </tr>
                      <tr>
                        <td className="px-4 py-3 font-medium flex items-center"><Globe className="text-blue-500 mr-2" size={16}/> IPv6に切り替え</td>
                        <td className="px-4 py-3 text-slate-500">インターネット層</td>
                        <td className="px-4 py-3">プロバイダの渋滞を迂回し、ジッター（揺らぎ）を解消。</td>
                      </tr>
                    </tbody>
                  </table>
                </div>
              </div>
            </section>

            {/* Section 5: CDN & Data Permanence */}
            <section>
              <SectionTitle icon={<Cloud className="text-sky-500" />} title="5. CDNと「一度放たれたデータは消せない」現実" />
              <p className="text-lg mb-6 text-slate-600">
                何十GBのゲームアプデやバズった動画がサクサク見れるのは、「CDN（コンテンツ配信ネットワーク）」のおかげ。大元サーバーのデータが、あなたの家の近くの「エッジサーバー」に自動的にコピー（キャッシュ）されているからです。
              </p>

              <div className="bg-white rounded-2xl shadow-xl p-8 border border-slate-100 relative overflow-hidden">
                <div className="flex flex-col items-center">
                  
                  {/* Origin */}
                  <div className="flex flex-col items-center mb-8">
                    <Database size={48} className="text-blue-600" />

                  </div>

                  {/* Data Flow */}
                  <div className="flex justify-center w-full max-w-lg mb-8 relative">
                    <ArrowDown size={32} className="text-slate-300 absolute -top-6" />
                    <div className="w-full h-1 bg-slate-200"></div>
                    <div className="absolute top-[-2px] left-1/2 w-3 h-3 bg-blue-500 rounded-full animate-ping"></div>

                {/* Warning Box */}
                <div className="mt-8 bg-red-50 border-l-4 border-red-500 p-6 rounded-r-xl">

                  <p className="text-sm text-red-700 leading-relaxed">
                    この「世界中に効率よくコピーを増殖させる仕組み」が、SNSの炎上が取り返しがつかなくなる技術的な要因です。<br/><br/>
                    あなたが焦って自分のスマホから不適切な写真を「削除」しても、それは<strong>大元サーバーのデータを消しただけ</strong>です。世界中に散らばった無数のエッジサーバーには、古いデータ（キャッシュ）が一定期間残り続けます。<br/>
                    「ネットにデータを放つ＝世界中のサーバーに自律的にコピーを増殖させる」ことであり、すべてを消し去ることは設計上不可能です。
                  </p>

                  </p>
                  <p className="text-lg text-slate-600">

                  <div className="flex flex-col items-center">

                    <div className="bg-slate-700 p-4 rounded-xl flex items-center w-full mt-2">
                      <Smartphone className="text-slate-400 mr-4" size={32} />
                      <div>
                        <span className="text-yellow-400 text-xs font-bold block mb-1">⚡ プッシュ通知で叩き起こす</span>
                        <span className="text-white text-sm">「発送完了のお知らせ」を受信</span>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </section>

            {/* Conclusion */}
            <section className="bg-gradient-to-br from-slate-800 to-slate-900 rounded-3xl p-8 md:p-12 text-center shadow-2xl mt-12">

              <p className="text-lg text-slate-300 max-w-2xl mx-auto leading-relaxed">
                スマートフォンやゲームは「魔法の箱」ではありません。<br/>
                電磁波、光ファイバー、プロトコル、キャッシュ、データベース…これらが複雑に絡み合った<strong>巨大な物理インフラ</strong>です。<br/><br/>
                ラグの理由を推測し、ルーターを変えてみる。消せないデータの仕組みを知って、送信ボタンを押す前に立ち止まる。<br/>
                この「裏側の仕組みを想像する力（エンジニアリング・マインド）」こそが、これからの時代を生き抜く最強の武器になります。
              </p>
